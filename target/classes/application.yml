langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API-KEY}
      model-name: qwen3-max-2026-01-23
#      base-url: http://localhost:11434/v1
#      api-key: ollama
#      model-name: deepseek-r1:1.5b
      log-requests: false
      log-responses: false
      timeout: 60s
      max-retries: 3
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API-KEY}
      model-name: qwen3-max-2026-01-23
#      base-url: http://localhost:11434/  v1
#      api-key: ollama
#      model-name: qwen3:0.6b
      log-requests: false
      log-responses: false
      timeout: 60s
      max-retries: 3
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API-KEY}
      model-name: text-embedding-v3
#      base-url: http://localhost:11434/v1
#      api-key: ollama
